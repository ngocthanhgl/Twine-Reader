name: Android CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode keystore
        run: |
          mkdir -p release
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > release/reader.jks

      - name: Build fossRelease APK
        run: ./gradlew assembleFossRelease \
          -PREADER_KEYSTORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }} \
          -PREADER_KEY_PASSWORD=${{ secrets.KEY_PASSWORD }} \
          -PVERSION_CODE=${{ github.run_number }} \
          -PVERSION_NAME=1.0.${{ github.run_number }}
        env:
          BUGSNAG_API_KEY: ""

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: twine-foss-release
          path: androidApp/build/outputs/apk/foss/release/*.apk

      - name: Create release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: androidApp/build/outputs/apk/foss/release/*.apk
          generate_release_notes: true
