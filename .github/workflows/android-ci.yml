name: Android CI

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Create CI keystore
        run: |
          mkdir -p release
          keytool -genkey -v -keystore release/reader.jks \
            -alias reader_alias -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=CI, OU=CI, O=CI, L=CI, S=CI, C=CI"

      - name: Build fullRelease APK
        run: ./gradlew assembleFullRelease -PREADER_KEYSTORE_PASSWORD=android -PREADER_KEY_PASSWORD=android -PVERSION_CODE=${{ github.run_number }} -PVERSION_NAME=1.0.${{ github.run_number }}
        env:
          BUGSNAG_API_KEY: ""

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: twine-full-release
          path: androidApp/build/outputs/apk/full/release/*.apk
