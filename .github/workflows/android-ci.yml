name: Android CI

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build fossDebug APK
        run: ./gradlew assembleFossDebug -PVERSION_CODE=${{ github.run_number }} -PVERSION_NAME=1.0.${{ github.run_number }}
        env:
          BUGSNAG_API_KEY: ""

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: twine-foss-debug
          path: androidApp/build/outputs/apk/foss/debug/*.apk
